<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RickTech Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px 30px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 1.5em; color: #38bdf8; }
  .header .status { display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #94a3b8; }
  .header .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.green { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .dot.red { background: #ef4444; box-shadow: 0 0 8px #ef444488; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
  .card h3 { font-size: 0.85em; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .card .big { font-size: 2.5em; font-weight: 700; color: #f1f5f9; }
  .card .sub { font-size: 0.85em; color: #64748b; margin-top: 5px; }
  .bar-item { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
  .bar-item .label { width: 100px; font-size: 0.85em; color: #94a3b8; }
  .bar-item .bar-bg { flex: 1; height: 22px; background: #334155; border-radius: 10px; overflow: hidden; }
  .bar-item .bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s; display: flex; align-items: center; padding-left: 8px; font-size: 0.75em; font-weight: 600; color: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
  th { text-align: left; padding: 10px 8px; color: #94a3b8; font-weight: 600; border-bottom: 2px solid #334155; }
  td { padding: 8px; border-bottom: 1px solid #1e293b; }
  tr:hover { background: #33415533; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.8em; font-weight: 600; }
  .badge.success { background: #22c55e33; color: #22c55e; }
  .badge.error { background: #ef444433; color: #ef4444; }
  .badge.pending { background: #eab30833; color: #eab308; }
  .footer { text-align: center; padding: 20px; color: #475569; font-size: 0.8em; }
  .refresh { background: #334155; border: 1px solid #475569; color: #e2e8f0; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85em; }
  .refresh:hover { background: #475569; }
  .last-update { color: #64748b; font-size: 0.8em; }
  a { color: #38bdf8; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🤖 RickTech / BeMovil</h1>
    <div class="status" id="headerStatus">Cargando...</div>
  </div>
  <div style="display:flex;align-items:center;gap:15px;flex-wrap:wrap;">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh" onclick="cargarDatos()">🔄 Actualizar</button>
  </div>
</div>

<div class="container">

  <div class="grid" id="mainCards">
    <div class="card"><h3>📱 Recargas</h3><div class="big" id="totalTopups">—</div><div class="sub" id="topupsDetail"></div></div>
    <div class="card"><h3>💡 Pagos Servicios</h3><div class="big" id="totalBills">—</div><div class="sub" id="billsDetail"></div></div>
    <div class="card"><h3>💬 Conversaciones</h3><div class="big" id="conversaciones">—</div><div class="sub">Activas ahora</div></div>
    <div class="card"><h3>🧠 DeepSeek API</h3><div class="big" id="deepseekStatus">—</div><div class="sub" id="evolutionStatus"></div></div>
  </div>

  <div class="grid" style="grid-template-columns: 1.5fr 1fr;">
    <div class="card">
      <h3>📊 Top Operadoras</h3>
      <div id="topOperators"></div>
    </div>
    <div class="card">
      <h3>📈 Últimos 7 Días</h3>
      <div id="dailyChart"></div>
    </div>
  </div>

  <div class="card">
    <h3>🕐 Últimas 10 Transacciones</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Tipo</th><th>Detalle</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody id="lastTransactions"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footer">
  RickTech © 2026 — <a href="/health">Health</a> — <a href="/stats">Stats JSON</a>
</div>

<script>
async function cargarDatos() {
  try {
    const resStats = await fetch('/stats');
    const stats = await resStats.json();
    const resHealth = await fetch('/health');
    const health = await resHealth.json();

    document.getElementById('lastUpdate').textContent = '🕐 ' + new Date().toLocaleTimeString();

    // Status
    const d = health.deepseek === 'ok' ? 'green' : 'red';
    const e = health.evolution === 'ok' ? 'green' : 'red';
    document.getElementById('headerStatus').innerHTML = `<span class="dot ${d}"></span> DeepSeek &nbsp; <span class="dot ${e}"></span> Evolution`;

    // Cards
    if (stats.summary) {
      const s = stats.summary;
      document.getElementById('totalTopups').textContent = s.total_topups || 0;
      document.getElementById('topupsDetail').textContent = `✅ ${s.success_topups || 0} | ❌ ${s.failed_topups || 0}`;
      document.getElementById('totalBills').textContent = s.total_bills || 0;
      document.getElementById('billsDetail').textContent = `✅ ${s.success_bills || 0} | ❌ ${s.failed_bills || 0}`;
    }
    document.getElementById('conversaciones').textContent = stats.conversations_active || 0;
    document.getElementById('deepseekStatus').textContent = health.deepseek === 'ok' ? '✅ Conectada' : '❌ Sin conexión';
    document.getElementById('evolutionStatus').textContent = health.evolution === 'ok' ? '✅ Evolution API' : '❌ Evolution API';

    // Top operadoras
    const top = document.getElementById('topOperators');
    if (stats.topOperators && stats.topOperators.length > 0) {
      const max = Math.max(...stats.topOperators.map(o => o.count));
      const colors = ['#38bdf8','#22c55e','#eab308','#a855f7','#f97316'];
      top.innerHTML = stats.topOperators.map((o, i) => {
        const pct = (o.count / max * 100).toFixed(0);
        return `<div class="bar-item"><span class="label">${o.operator}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${colors[i%5]}">${o.count}</div></div></div>`;
      }).join('');
    } else {
      top.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px;">Sin datos</div>';
    }

    // Daily
    const daily = document.getElementById('dailyChart');
    if (stats.byDay && stats.byDay.length > 0) {
      const max = Math.max(...stats.byDay.map(d => d.count));
      daily.innerHTML = stats.byDay.map(d => {
        const pct = (d.count / max * 100).toFixed(0);
        return `<div class="bar-item"><span class="label">${d.date.slice(5)}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:#38bdf8">${d.count}</div></div></div>`;
      }).join('');
    } else {
      daily.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px;">Sin datos</div>';
    }

    // Últimas
    const tb = document.getElementById('lastTransactions');
    if (stats.last10 && stats.last10.length > 0) {
      tb.innerHTML = stats.last10.map(t => {
        const tipo = t.type === 'topup' ? '📱 Recarga' : '💡 Pago';
        const det = t.type === 'topup' ? `${t.operator} | ${t.phone} | $${t.amount}` : `${t.service} | Ref: ${t.reference}`;
        return `<tr><td>${tipo}</td><td>${det}</td><td><span class="badge ${t.status}">${t.status}</span></td><td>${new Date(t.created_at).toLocaleString()}</td></tr>`;
      }).join('');
    } else {
      tb.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#64748b;padding:20px;">Sin transacciones</td></tr>';
    }

  } catch (err) {
    document.getElementById('headerStatus').textContent = '❌ Error de conexión';
  }
}

setInterval(cargarDatos, 10000);
cargarDatos();
</script>
</body>
</html>
