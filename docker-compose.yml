# ============================================
# docker-compose.yml - RickTech Ecosystem
# ============================================
# Uso:
#   docker compose up -d
#   docker compose logs -f bot
#   docker compose down
# ============================================
# NOTA: Evolution API ya existe como contenedor
# externo (evolution_api, puerto 8080).
# El bot se conecta a el via red compartida.
# ============================================

services:

  # ==========================================
  # MYSQL - Base de datos para el bot
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: ricktech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ricktech
      MYSQL_USER: ricktech_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ricktech_network

  # ==========================================
  # BOT - WebScraper + DeepSeek AI
  # ==========================================
  bot:
    build: .
    container_name: ricktech-bot
    restart: unless-stopped
    shm_size: '1gb'
    environment:
      PORT: 3000
      BEMOVIL_USER: ${BEMOVIL_USER}
      BEMOVIL_PASS: ${BEMOVIL_PASS}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      EVOLUTION_API_URL: http://evolution_api:8080
      EVOLUTION_API_TOKEN: ${EVOLUTION_API_TOKEN}
      INSTANCE_NAME: ${INSTANCE_NAME}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ricktech_user
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ricktech
      AUTHORIZED_NUMBERS: ${AUTHORIZED_NUMBERS:-*}
      ADMIN_NUMBERS: ${ADMIN_NUMBERS}
    ports:
      - "3000:3000"
    volumes:
      - bot_screenshots:/app/screenshots
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ricktech_network
      - sistema-kiosko_default

  # ==========================================
  # PHPMyAdmin - Admin web de BD (opcional)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: ricktech-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ricktech_user
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - ricktech_network

volumes:
  mysql_data:
  bot_screenshots:

networks:
  ricktech_network:
    driver: bridge
  sistema-kiosko_default:
    external: true
